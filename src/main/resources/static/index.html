<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downtown E-Scooter Rental System</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 字体图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<!-- 头部导航 -->
<header>
    <div class="container">
        <h1><i class="fa-solid fa-scooter"></i> E-Scooter Rental</h1>
        <nav>
            <a href="#scooters"><i class="fa-solid fa-list"></i> Available Scooters</a>
            <a href="#rent"><i class="fa-solid fa-handshake"></i> Rent/Return</a>
        </nav>
    </div>
</header>

<!-- 主体内容 -->
<main class="container">
    <!-- 车辆列表区 -->
    <section id="scooters" class="scooter-section">
        <h2><i class="fa-solid fa-motorcycle"></i> Available Scooters</h2>
        <div class="scooter-grid" id="scooterGrid">
            <!-- 车辆卡片JS -->
        </div>
    </section>

    <!-- 租赁/归还区 -->
    <section id="rent" class="rent-section">
        <h2><i class="fa-solid fa-right-left"></i> Rent & Return</h2>
        <div class="form-container">
            <!-- 租赁表单 -->
            <div class="form-box">
                <h3><i class="fa-solid fa-arrow-right"></i> Rent a Scooter</h3>
                <form id="rentForm">
                    <label for="userName">Your Name:</label>
                    <input type="text" id="userName" placeholder="Enter your full name" required>
                    <label for="scooterId">Scooter ID:</label>
                    <input type="number" id="scooterId" placeholder="Enter scooter ID (e.g. 1)" required>
                    <button type="submit"><i class="fa-solid fa-check"></i> Confirm Rental</button>
                </form>
            </div>
            <!-- 归还表单 -->
            <div class="form-box">
                <h3><i class="fa-solid fa-arrow-left"></i> Return a Scooter</h3>
                <form id="returnForm">
                    <label for="returnScooterId">Scooter ID:</label>
                    <input type="number" id="returnScooterId" placeholder="Enter scooter ID (e.g. 1)" required>
                    <button type="submit"><i class="fa-solid fa-check"></i> Confirm Return</button>
                </form>
            </div>
        </div>
    </section>
</main>

<!-- 底部 -->
<footer>
    <div class="container">
        <p><i class="fa-solid fa-copyright"></i> 2026 Downtown E-Scooter Rental System. All Rights Reserved.</p>
        <p>Contact: support@escooter-rental.com | <i class="fa-solid fa-location-dot"></i> Downtown Plaza, City Center</p>
    </div>
</footer>

<script src="js/script.js"></script>
</body>
</html>
